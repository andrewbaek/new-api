# ============================================================
# Docker Compose 生产环境配置
# 用法: docker compose -f docker-compose.production.yml up -d
# ============================================================

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api:production
    container_name: new-api-production
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - prod_data:/data
    environment:
      # 数据库配置（必须修改密码！）
      - SQL_DSN=postgresql://root:CHANGE_THIS_PASSWORD@postgres:5432/new-api

      # Redis 配置
      - REDIS_CONN_STRING=redis://:CHANGE_THIS_PASSWORD@redis:6379

      # Session 密钥（必须修改！使用 openssl rand -base64 32 生成）
      - SESSION_SECRET=CHANGE_THIS_TO_RANDOM_SECRET

      # 时区
      - TZ=Asia/Shanghai

      # 批量更新
      - BATCH_UPDATE_ENABLED=true

      # 日志级别
      - LOG_LEVEL=info

      # 可选：如果使用对象存储
      # - S3_ENDPOINT=
      # - S3_ACCESS_KEY=
      # - S3_SECRET_KEY=
      # - S3_BUCKET=

    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - prod-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: new-api-prod-redis
    restart: unless-stopped
    command: redis-server --requirepass CHANGE_THIS_PASSWORD --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - prod_redis_data:/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: new-api-prod-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: CHANGE_THIS_PASSWORD
      POSTGRES_DB: new-api
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - prod_pg_data:/var/lib/postgresql/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 5
    # 性能优化配置
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=1310kB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"

volumes:
  prod_data:
    driver: local
  prod_redis_data:
    driver: local
  prod_pg_data:
    driver: local

networks:
  prod-network:
    driver: bridge
