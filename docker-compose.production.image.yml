# ============================================================
# Docker Compose 生产环境配置（image 版）
#
# 与 docker-compose.production.yml 的差异：
#   - 用 image: ${IMAGE_TAG} 替代 build:（适配方案 A：本地构建 + 镜像传输）
#   - 所有密码/密钥从 .env.production 读取（不再硬编码 CHANGE_THIS_*）
#   - 加了内存限制（适配 2C4G 轻量服务器）
#   - PostgreSQL 调优参数针对 2C4G 重新计算
#
# 部署位置：/opt/new-api/docker-compose.production.image.yml
# 用法：docker compose --env-file .env.production \
#         -f docker-compose.production.image.yml up -d
# ============================================================

services:
  new-api:
    image: xiang-api:${IMAGE_TAG:-latest}
    container_name: new-api-production
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"  # 仅绑定本地，由 Nginx 反代对外
    volumes:
      - /opt/new-api/data:/data
      - /opt/new-api/logs:/app/logs
    command: --log-dir /app/logs
    environment:
      - SQL_DSN=${SQL_DSN}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING}
      - SESSION_SECRET=${SESSION_SECRET}
      - CRYPTO_SECRET=${ENCRYPT_KEY}
      - TZ=${TZ:-Asia/Shanghai}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
      - SERVER_ADDRESS=${SERVER_ADDRESS}
      - ERROR_LOG_ENABLED=true
      - NODE_NAME=new-api-prod
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - prod-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: new-api-prod-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "no"
      - --save
      - ""
    volumes:
      - /opt/new-api/data/redis:/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 192M

  postgres:
    image: postgres:15-alpine
    container_name: new-api-prod-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: new-api
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /opt/new-api/data/postgres:/var/lib/postgresql/data
    networks:
      - prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 5
    # PostgreSQL 调优 (2C4G 机型)
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - work_mem=2MB
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - min_wal_size=512MB
      - -c
      - max_wal_size=2GB
      - -c
      - log_min_duration_statement=1000
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  prod-network:
    driver: bridge
