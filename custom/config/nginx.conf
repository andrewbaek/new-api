# ============================================================
# Nginx 生产配置（象汇 API）
#
# 部署：
#   1. setup-server-cn.sh 会自动写 /etc/nginx/conf.d/00-limit-req.conf
#      （定义 zone=api_limit），本文件直接引用即可
#   2. 上传你的 SSL 证书到 /etc/ssl/new-api/{fullchain.pem,privkey.pem}
#   3. 修改本文件中的 api.YOUR_DOMAIN.com 和 YOUR_IP_ADDRESS
#   4. sudo cp custom/config/nginx.conf /etc/nginx/sites-available/new-api
#   5. sudo ln -sfn /etc/nginx/sites-available/new-api /etc/nginx/sites-enabled/new-api
#   6. sudo nginx -t && sudo systemctl reload nginx
#
# 与原版差异（手动证书版，无 certbot 依赖）：
#   - SSL 证书路径改为 /etc/ssl/new-api/
#   - 删除 /.well-known/acme-challenge/ 段
# ============================================================

# ── HTTP → HTTPS 重定向 ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.YOUR_DOMAIN.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主配置 ───────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.YOUR_DOMAIN.com;

    # ── SSL 证书（手动上传到 /etc/ssl/new-api/）────────────
    ssl_certificate     /etc/ssl/new-api/fullchain.pem;
    ssl_certificate_key /etc/ssl/new-api/privkey.pem;

    # SSL 安全配置（Mozilla Intermediate）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/new-api-access.log;
    error_log  /var/log/nginx/new-api-error.log;

    # 上传大小（含图像/语音）
    client_max_body_size 50M;

    # ── 管理端保护 ─────────────────────────────────────────
    # /panel 路径仅允许指定 IP 访问（修改为你的管理 IP）
    location ^~ /panel {
        # allow YOUR_IP_ADDRESS;        # 你的家庭/办公 IP
        # allow ANOTHER_IP_ADDRESS;     # 备用 IP
        # deny all;
        # 提示：默认注释掉了 IP 白名单（避免误锁），上线前请取消注释

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API 接口（速率限制 + 长超时 + 流式）────────────────
    location ~ ^/v1/ {
        limit_req zone=api_limit burst=200 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长超时（流式响应需要）
        proxy_connect_timeout 75s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;

        # 流式输出关键设置
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
    }

    # ── 静态资源缓存 ───────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 其他路由（含 WebSocket）────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ────────────────────────────────────────────────────────────
# 注意：limit_req_zone 已由 setup-server-cn.sh 写入
#       /etc/nginx/conf.d/00-limit-req.conf
# ────────────────────────────────────────────────────────────
